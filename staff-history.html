<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction History</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">

<h2>🥚 Triple A</h2>

<a href="staff-dashboard.html">Dashboard</a>
</div>

<div class="main">

<h1>Transaction History</h1>

<div class="card">

<input
type="text"
id="searchTransaction"
placeholder="Search Action..."
onkeyup="renderTransactions()">

</div>

<div class="card">

<input
type="date"
id="filterDate"
onchange="renderTransactions()">

</div>

<div class="card">

<button onclick="exportCSV()">
Export CSV
</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Date</th>
<th>Action</th>
<th>User</th>
<th>Details</th>

</tr>

</thead>

<tbody id="transactionBody">

</tbody>

</table>

</div>

</div>

<script src="history.js"></script>

</body>
</html>
