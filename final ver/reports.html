<div class="dashboard-grid">

</div>

<div class="card">
<h3>Total Orders</h3>
<h2 id="totalOrders">0</h2>
</div>

<div class="card">

<h2 id="topCategory">-</h2>
</div>

<h2 id="averageOrder">₱0</h2>
</div>

</div>

<div class="card">

<h2>Sales Revenue Chart</h2>

<canvas id="salesChart"></canvas>

</div>

<div class="card">

<h2>Category Performance</h2>

<canvas id="categoryChart"></canvas>

</div>

<button onclick="exportReportCSV()">
Export Report CSV
</button>

</div>

</div>
