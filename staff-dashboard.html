<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="sidebar">

<h2>🥚 Triple A Staff</h2>

<a href="staff-dashboard.html">Dashboard</a>
<a href="staff-inventory.html">Inventory</a>
<a href="orderstaff.html">Orders</a>
<a href="staff-history.html">Transaction History</a>

<button onclick="logout()">
Logout
</button>

</div>

<div class="main">

<h1>Staff Dashboard</h1>

<div class="dashboard-grid">

<div class="card">
<h3>Today's Orders</h3>
<h2 id="todayOrders">0</h2>
</div>

<div class="card">
<h3>Pending Orders</h3>
<h2 id="pendingOrders">0</h2>
</div>

<div class="card">
<h3>Delivered Orders</h3>
<h2 id="deliveredOrders">0</h2>
</div>

<div class="card">
<h3>Total Transactions</h3>
<h2 id="totalTransactions">0</h2>
</div>

</div>

<div class="card">

<h2>Order Status Overview</h2>

<canvas id="orderChart"></canvas>

</div>

<div class="card">

<h2>Recent Orders</h2>

<table>

<thead>

<tr>

<th>Customer</th>
<th>Category</th>
<th>Trays</th>
<th>Status</th>

</tr>

</thead>

<tbody id="recentOrders">

</tbody>

</table>

</div>

</div>

<script src="staff-dashboard.js"></script>

</body>
</html>
